<title>BizOS — Rishu's Business OS</title>
<style>
  :root{
    --bg:#F7F4EE; --panel:#F1EDE4; --surface:#FFFFFF; --surface-2:#EFEAE0;
    --line:#E2DACB; --line-soft:#EAE4D7;
    --ink:#211E1A; --ink-dim:#6B655C; --ink-faint:#9A9187;
    --accent:#A8763A; --accent-soft:#F3EBDD; --accent-ink:#5C3F1D;
    --urgent:#B3261E; --urgent-bg:#FBEAE9;
    --good:#3F6B4B; --good-bg:#EAF2EC;
    --warn:#8A6116; --warn-bg:#FBF0DD;
    --raas:#4A4066; --raas-bg:#EDEBF2;
    --frameboxx:#2C5C8A; --frameboxx-bg:#E9EFF4;
    --crumble:#B0563D; --crumble-bg:#F6EAE5;
    --artmize:#A8763A; --artmize-bg:#F3EBDD;
    --shadow:0 1px 2px rgba(33,30,26,.05),0 4px 16px rgba(33,30,26,.06);
    --shadow-lg:0 4px 12px rgba(33,30,26,.10),0 16px 48px rgba(33,30,26,.14);
    --r:10px; --r-lg:14px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --display:Iowan Old Style,"Palatino Linotype",Georgia,serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#171511; --panel:#1C1A15; --surface:#201D18; --surface-2:#2A2620;
      --line:#3A352C; --line-soft:#2E2A22;
      --ink:#EDE8DE; --ink-dim:#A79C8C; --ink-faint:#7A7264;
      --accent:#D9A34F; --accent-soft:#332711; --accent-ink:#F1D9AE;
      --urgent:#E5847C; --urgent-bg:#3A1E1C;
      --good:#7FBE93; --good-bg:#1D2F22;
      --warn:#E0B355; --warn-bg:#332711;
      --raas:#9C90C2; --raas-bg:#262340;
      --frameboxx:#7FAFD6; --frameboxx-bg:#1D2C3A;
      --crumble:#E09A80; --crumble-bg:#33221B;
      --artmize:#D9A34F; --artmize-bg:#332711;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
      --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="dark"]{
    --bg:#171511; --panel:#1C1A15; --surface:#201D18; --surface-2:#2A2620;
    --line:#3A352C; --line-soft:#2E2A22;
    --ink:#EDE8DE; --ink-dim:#A79C8C; --ink-faint:#7A7264;
    --accent:#D9A34F; --accent-soft:#332711; --accent-ink:#F1D9AE;
    --urgent:#E5847C; --urgent-bg:#3A1E1C;
    --good:#7FBE93; --good-bg:#1D2F22;
    --warn:#E0B355; --warn-bg:#332711;
    --raas:#9C90C2; --raas-bg:#262340;
    --frameboxx:#7FAFD6; --frameboxx-bg:#1D2C3A;
    --crumble:#E09A80; --crumble-bg:#33221B;
    --artmize:#D9A34F; --artmize-bg:#332711;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
    --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.5);
  }
  :root[data-theme="light"]{
    --bg:#F7F4EE; --panel:#F1EDE4; --surface:#FFFFFF; --surface-2:#EFEAE0;
    --line:#E2DACB; --line-soft:#EAE4D7;
    --ink:#211E1A; --ink-dim:#6B655C; --ink-faint:#9A9187;
    --accent:#A8763A; --accent-soft:#F3EBDD; --accent-ink:#5C3F1D;
    --urgent:#B3261E; --urgent-bg:#FBEAE9;
    --good:#3F6B4B; --good-bg:#EAF2EC;
    --warn:#8A6116; --warn-bg:#FBF0DD;
    --raas:#4A4066; --raas-bg:#EDEBF2;
    --frameboxx:#2C5C8A; --frameboxx-bg:#E9EFF4;
    --crumble:#B0563D; --crumble-bg:#F6EAE5;
    --artmize:#A8763A; --artmize-bg:#F3EBDD;
    --shadow:0 1px 2px rgba(33,30,26,.05),0 4px 16px rgba(33,30,26,.06);
    --shadow-lg:0 4px 12px rgba(33,30,26,.10),0 16px 48px rgba(33,30,26,.14);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  input,select,textarea{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;outline:none}
  input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  a{color:var(--accent-ink)}
  ::placeholder{color:var(--ink-faint)}
  @media (prefers-reduced-motion: no-preference){
    .card,.btn,.nav-item,.task-row,.toast,.modal,.overlay,.pill,.tab{transition:background .15s ease,border-color .15s ease,transform .15s ease,opacity .15s ease,box-shadow .15s ease}
  }

  .app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:52px 1fr;height:100dvh}
  /* topbar */
  .topbar{grid-column:1/3;display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--bg);border-bottom:1px solid var(--line);position:relative;z-index:20}
  .logo{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .logo .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block}
  .searchbox{flex:1;max-width:460px;margin:0 auto;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:6px 12px;color:var(--ink-faint);cursor:pointer;font-size:13px}
  .searchbox kbd{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--ink-dim)}
  .top-actions{display:flex;align-items:center;gap:4px;margin-left:auto}
  .icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;font-size:16px;position:relative;color:var(--ink-dim)}
  .icon-btn:hover{background:var(--surface-2)}
  .badge{position:absolute;top:2px;right:2px;min-width:16px;height:16px;border-radius:8px;background:var(--urgent);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px;font-family:var(--mono)}
  .hamburger{display:none}

  /* sidebar */
  .sidebar{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:12px 10px 24px;display:flex;flex-direction:column;gap:2px}
  .nav-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);padding:14px 10px 6px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--ink-dim);text-decoration:none;font-weight:500;font-size:13.5px}
  .nav-item:hover{background:var(--surface-2);color:var(--ink)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
  .nav-item .ico{width:18px;text-align:center;font-size:14px}
  .biz-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .nav-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-faint)}

  /* main */
  .main{overflow-y:auto;padding:24px;min-width:0}
  .page{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  h1.pt{font-family:var(--display);font-size:24px;margin:0;letter-spacing:.2px;text-wrap:balance}
  .pt-sub{color:var(--ink-dim);font-size:13px;margin-top:3px}
  h2.st{font-family:var(--display);font-size:16px;margin:0}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
  .card.flat{box-shadow:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:900px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}

  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .stat .n{font-family:var(--mono);font-size:20px;font-weight:600;font-variant-numeric:tabular-nums}
  .stat .c{font-size:11.5px;color:var(--ink-dim);margin-top:2px}
  .stat.urgent{border-color:var(--urgent);background:var(--urgent-bg)}
  .stat.urgent .n{color:var(--urgent)}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-weight:600;font-size:13px;border:1px solid var(--line);background:var(--surface);color:var(--ink)}
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  :root[data-theme="dark"] .btn.primary,body .btn.primary{color:#fff}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.danger{color:var(--urgent);border-color:var(--urgent)}
  .btn.sm{padding:4px 10px;font-size:12px}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--ink-dim)}
  .btn.ghost:hover{background:var(--surface-2);color:var(--ink)}

  .pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .pill.p1{background:var(--urgent-bg);color:var(--urgent)}
  .pill.p2{background:var(--warn-bg);color:var(--warn)}
  .pill.p3{background:var(--surface-2);color:var(--ink-dim)}
  .pill.ok{background:var(--good-bg);color:var(--good)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.urgent{background:var(--urgent-bg);color:var(--urgent)}
  .pill.neutral{background:var(--surface-2);color:var(--ink-dim)}

  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .toolbar input[type="search"]{min-width:160px;flex:1;max-width:260px}
  .toolbar select{font-size:13px;padding:6px 8px}

  /* tasks */
  .task-group{margin-bottom:8px}
  .task-group-h{display:flex;align-items:center;gap:8px;padding:10px 4px 6px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:6px;cursor:grab}
  .task-row:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .task-row.done .t-title{text-decoration:line-through;color:var(--ink-faint)}
  .task-row.dragging{opacity:.4}
  .t-check{margin-top:2px;width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .t-body{flex:1;min-width:0;cursor:pointer}
  .t-title{font-weight:600;font-size:13.5px}
  .t-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;font-size:11.5px;color:var(--ink-dim)}
  .t-due.overdue{color:var(--urgent);font-weight:600}
  .t-due.today{color:var(--warn);font-weight:600}

  /* tables */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
  table.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  table.tbl th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--surface-2)}
  table.tbl td{padding:9px 12px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl tr:hover td{background:var(--surface-2)}
  table.tbl td .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap}
  table.tbl select,table.tbl input[type="date"]{padding:4px 6px;font-size:12px;border-radius:6px;background:transparent}
  .lead-name{font-weight:600;cursor:pointer}
  .lead-name:hover{color:var(--accent-ink);text-decoration:underline}

  /* tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{padding:8px 14px;font-weight:600;font-size:13px;color:var(--ink-dim);border-bottom:2px solid transparent;white-space:nowrap;text-decoration:none}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--accent-ink);border-bottom-color:var(--accent)}

  /* brand cards */
  .brand-card{border-left:3px solid var(--bc,var(--accent));background:var(--bb,var(--surface-2));border-radius:var(--r);padding:12px 14px}
  .brand-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .brand-name{font-weight:700;font-size:14px;color:var(--bc,var(--accent))}
  .brand-day{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .brand-pillar{font-size:12.5px;font-weight:600;margin-top:4px}
  .brand-card p{margin:4px 0 0;font-size:13px}
  .brand-card .cap{color:var(--ink-dim);font-size:12px;font-style:italic}
  .mk-extra{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .mk-chip{font-family:var(--mono);font-size:10.5px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:3px 7px;color:var(--ink-dim)}

  /* overlay & modal */
  .overlay{position:fixed;inset:0;background:rgba(20,17,12,.45);display:grid;place-items:center;z-index:100;padding:16px;backdrop-filter:blur(2px)}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:85dvh;overflow-y:auto;padding:20px}
  .modal h3{font-family:var(--display);font-size:17px;margin:0 0 14px}
  .frm{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .frm .full{grid-column:1/3}
  .frm label{display:flex;flex-direction:column;gap:4px;font-size:11.5px;font-weight:600;color:var(--ink-dim)}
  .frm textarea{min-height:70px;resize:vertical}
  .modal-foot{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .modal-foot .spacer{flex:1}
  @media(max-width:560px){.frm{grid-template-columns:1fr}.frm .full{grid-column:1}}

  /* palette */
  .palette{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;overflow:hidden;align-self:start;margin-top:10vh}
  .palette input{width:100%;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:14px 16px;font-size:15px;background:transparent}
  .pal-list{max-height:50vh;overflow-y:auto;padding:6px}
  .pal-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px}
  .pal-item .ico{width:20px;text-align:center}
  .pal-item .sub{margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:var(--mono)}
  .pal-item.sel{background:var(--accent-soft);color:var(--accent-ink)}
  .pal-empty{padding:20px;text-align:center;color:var(--ink-faint);font-size:13px}

  /* notifications */
  .notif-panel{position:fixed;top:56px;right:16px;width:min(380px,calc(100vw - 24px));max-height:70vh;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:100;padding:8px}
  .notif{display:flex;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;align-items:flex-start}
  .notif:hover{background:var(--surface-2)}
  .notif .nt{font-weight:600;font-size:13px}
  .notif .nb{font-size:12px;color:var(--ink-dim);margin-top:1px}
  .notif.unread .nt::after{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:6px}

  /* toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,16px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;z-index:200;box-shadow:var(--shadow-lg);pointer-events:none}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  /* copilot */
  .chat{display:flex;flex-direction:column;gap:10px;min-height:200px}
  .msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13.5px;white-space:pre-wrap}
  .msg.user{align-self:flex-end;background:var(--accent-soft);color:var(--accent-ink);border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:var(--surface-2);border-bottom-left-radius:4px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--ink-dim);cursor:pointer}
  .chip:hover{border-color:var(--accent);color:var(--accent-ink)}
  .chat-input{display:flex;gap:8px;margin-top:12px}
  .chat-input input{flex:1}

  /* bars */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px}
  .bar-label{width:130px;flex-shrink:0;color:var(--ink-dim);text-align:right}
  .bar-track{flex:1;height:16px;background:var(--surface-2);border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px;background:var(--bc,var(--accent))}
  .bar-val{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);width:70px}

  .agenda-day{margin-bottom:14px}
  .agenda-date{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .agenda-item{display:flex;gap:10px;align-items:center;padding:7px 10px;background:var(--surface);border:1px solid var(--line-soft);border-radius:8px;margin-bottom:6px;font-size:13px}

  .doc-card{display:flex;flex-direction:column;gap:4px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);text-decoration:none;color:var(--ink)}
  .doc-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .doc-card .dt{font-weight:600;font-size:13.5px}
  .doc-card .dd{font-size:12px;color:var(--ink-dim)}

  .empty{padding:28px;text-align:center;color:var(--ink-faint);font-size:13px;border:1px dashed var(--line);border-radius:var(--r)}
  .note-box{font-size:12px;color:var(--ink-dim);background:var(--surface-2);border-radius:8px;padding:10px 12px}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:5px;padding:1px 6px}

  /* mobile */
  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;top:52px;left:0;bottom:0;width:250px;z-index:50;transform:translateX(-100%);box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:translateX(0)}
    @media (prefers-reduced-motion: no-preference){.sidebar{transition:transform .2s ease}}
    .hamburger{display:grid}
    .main{padding:16px}
    .searchbox{max-width:none}
    .searchbox kbd{display:none}
  }
</style>

<div id="root"></div>
<div id="layer"></div>

const BIZ = {}; AI.businesses.forEach(b => BIZ[b.id] = b);
const LEAD_STATUSES = ['Not contacted','Contacted','In conversation','Meeting set','Proposal sent','Won','Lost','On hold','Research'];
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayISO = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtMoney = n => '₹' + Number(n||0).toLocaleString('en-IN', {maximumFractionDigits: 2});
const fmtDate = d => { if (!d) return '—'; const dt = new Date(d + 'T00:00:00'); if (isNaN(dt)) return d; return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short'}); };
const plural = (n, w) => n + ' ' + w + (n === 1 ? '' : 's');

function defaults(){ return { theme:null, tasks:[], seenSeeds:{}, leadOverrides:{}, userLeads:[], expenseOverrides:{}, userExpenses:[], notifRead:{}, copilot:[], posted:{} }; }
function load(){
  try { const raw = localStorage.getItem(KEY); if (!raw) return defaults();
    const parsed = JSON.parse(raw); return Object.assign(defaults(), parsed);
  } catch(e){ return defaults(); }
}
let st = load();
function save(){ try { localStorage.setItem(KEY, JSON.stringify(st)); } catch(e){ toast('Storage full — export a backup from Settings'); } }

/* adopt new AI seed tasks once (user then owns them forever) */
(AI.seedTasks || []).forEach(sd => {
  if (!st.seenSeeds[sd.id]) {
    st.seenSeeds[sd.id] = 1;
    st.tasks.push({ id: uid(), seed: sd.id, title: sd.title, business: sd.business||'', priority: sd.priority||'P2',
      due: sd.due||'', status:'todo', category: sd.category||'', notes: sd.notes||'', est:'', repeat:'none',
      links:[], value:'', created: Date.now(), order: st.tasks.length });
  }
});
save();

/* ============ derived data ============ */
function leads(){ return AI.leads.map(l => Object.assign({}, l, st.leadOverrides[l.id] || {})).concat(st.userLeads).filter(l => !l.archived); }
function expenses(){ return AI.expenses.map(e => Object.assign({}, e, st.expenseOverrides[e.id] || {})).concat(st.userExpenses).filter(e => !e.archived); }
function activeTasks(){ return st.tasks.filter(t => t.status !== 'archived'); }
function openTasks(){ return st.tasks.filter(t => t.status === 'todo' || t.status === 'doing'); }
function overdue(){ const t = todayISO(); return openTasks().filter(x => x.due && x.due < t); }
function dueToday(){ const t = todayISO(); return openTasks().filter(x => x.due === t); }
function followupsDue(){ const t = todayISO(); return leads().filter(l => l.next && l.next <= t && !/won|lost|research/i.test(l.status || '')); }
function urgentExpenses(){ return expenses().filter(e => e.flag === 'urgent'); }
function bizLeads(id){ return leads().filter(l => l.business === id); }
function planFor(id){ return (AI.posting.plans || []).find(p => p.business === id); }

function computeNotifs(){
  const out = [];
  urgentExpenses().forEach(e => out.push({ id:'exp-'+e.id, icon:'💰', title: e.vendor + ' — ' + fmtMoney(e.amount) + ' needs payment', body: e.note || '', route:'#/finance' }));
  overdue().forEach(t => out.push({ id:'od-'+t.id+'-'+t.due, icon:'⏰', title:'Overdue: ' + t.title, body:'Was due ' + fmtDate(t.due), route:'#/tasks' }));
  followupsDue().forEach(l => out.push({ id:'fu-'+l.id+'-'+(l.next||''), icon:'📞', title:'Follow up: ' + l.name, body:(BIZ[l.business] ? BIZ[l.business].short : '') + ' · due ' + fmtDate(l.next), route:'#/biz/'+l.business+'?tab=leads' }));
  const td = todayISO();
  (AI.posting.plans||[]).forEach(p => { if (AI.posting.date === td && !st.posted[td+'-'+p.business]) out.push({ id:'post-'+td+'-'+p.business, icon:'📢', title:'Not posted yet: ' + (BIZ[p.business]?BIZ[p.business].short:p.business), body:p.pillar, route:'#/marketing' }); });
  (AI.newLeadIds||[]).forEach(id => { const l = AI.leads.find(x => x.id === id); if (l) out.push({ id:'new-'+id, icon:'🆕', title:'New lead: ' + l.name, body: BIZ[l.business] ? BIZ[l.business].short : '', route:'#/biz/'+l.business+'?tab=leads' }); });
  out.push({ id:'gen-'+AI.generatedAt, icon:'✨', title:'Daily AI update completed', body:'Data refreshed ' + AI.generatedAt + ' · next run 6:00 AM IST', route:'#/home' });
  return out;
}
function unreadCount(){ return computeNotifs().filter(n => !st.notifRead[n.id]).length; }

/* ============ shell & routing ============ */
const root = document.getElementById('root');
const layer = document.getElementById('layer');
function route(){
  const h = location.hash.replace(/^#\/?/, '');
  const [path, qs] = h.split('?');
  const parts = path.split('/');
  return { view: parts[0] || 'home', arg: parts[1] || '', q: new URLSearchParams(qs || '') };
}
const NAV = [
  { id:'home', icon:'🏠', label:'Home' },
  { id:'analytics', icon:'📈', label:'Executive Dashboard' },
  { id:'calendar', icon:'📅', label:'Calendar' },
  { id:'tasks', icon:'✅', label:'Tasks' },
  { id:'marketing', icon:'📢', label:'Marketing Planner' },
  { id:'crm', icon:'👥', label:'CRM & Vendors' },
  { id:'finance', icon:'💰', label:'Finance' },
  { id:'documents', icon:'📄', label:'Documents' },
  { id:'copilot', icon:'🤖', label:'AI Copilot' },
  { id:'settings', icon:'⚙️', label:'Settings' }
];
function applyTheme(){ document.documentElement.dataset.theme = st.theme || ''; }
function render(){
  applyTheme();
  const r = route();
  const view = VIEWS[r.view] ? r.view : 'home';

  <div class="app">
    <div class="topbar">
      <button class="icon-btn hamburger" data-act="menu" aria-label="Menu">☰</button>
      <span class="logo"><span class="dot"></span>BizOS</span>
      <div class="searchbox" data-act="palette" role="button" tabindex="0">🔎 Search tasks, leads, docs…<kbd>Ctrl K</kbd></div>
      <div class="top-actions">
        <button class="icon-btn" data-act="bell" aria-label="Notifications">🔔${unreadCount() ? `<span class="badge">${unreadCount()}</span>` : ''}</button>
        <button class="icon-btn" data-act="theme" aria-label="Toggle theme">${(st.theme === 'dark' || (!st.theme && matchMedia('(prefers-color-scheme: dark)').matches)) ? '☀️' : '🌙'}</button>
      </div>
    </div>
    <nav class="sidebar" id="sidebar">
      ${NAV.map(n => `<a class="nav-item ${view === n.id ? 'active' : ''}" href="#/${n.id}"><span class="ico">${n.icon}</span>${n.label}${n.id === 'tasks' ? `<span class="nav-count">${openTasks().length}</span>` : ''}</a>`).join('')}
      <div class="nav-label">Businesses</div>
      ${AI.businesses.map(b => `<a class="nav-item ${view === 'biz' && r.arg === b.id ? 'active' : ''}" href="#/biz/${b.id}"><span class="biz-dot" style="background:var(--${b.cvar})"></span>${b.short}<span class="nav-count">${bizLeads(b.id).filter(l=>l.kind!=='research'&&!/won|lost/i.test(l.status)).length}</span></a>`).join('')}
    </nav>
    <main class="main"><div class="page">${VIEWS[view](r)}</div></main>
  </div>`;
}

/* ============ shared partials ============ */
function statTile(n, c, cls){ return `<div class="stat ${cls||''}"><div class="n">${n}</div><div class="c">${esc(c)}</div></div>`; }
function bizChip(id){ const b = BIZ[id]; return b ? `<span class="pill neutral"><span class="biz-dot" style="background:var(--${b.cvar})"></span>${esc(b.short)}</span>` : ''; }
function prioPill(p){ const m = {P1:['p1','P1 · Urgent'],P2:['p2','P2'],P3:['p3','P3']}; const [cls,txt] = m[p]||m.P2; return `<span class="pill ${cls}">${txt}</span>`; }
function duePill(d){ if(!d) return ''; const t = todayISO(); const cls = d < t ? 'overdue' : (d === t ? 'today' : ''); return `<span class="t-due ${cls}">📅 ${d < t ? 'Overdue · ' : (d === t ? 'Today' : fmtDate(d))}${d < t ? fmtDate(d) : ''}</span>`; }

function planCard(p, withExtras){
  const b = BIZ[p.business]; if (!b) return '';
  const td = AI.posting.date; const done = !!st.posted[td+'-'+p.business];
  return `<div class="brand-card" style="--bc:var(--${b.cvar});--bb:var(--${b.cvar}-bg)">
    <div class="brand-head"><span class="brand-name">${esc(b.short)}</span><span class="brand-day">${esc(AI.posting.day)} · ${done ? '✅ posted' : 'pending'}</span></div>
    <div class="brand-pillar">${esc(p.pillar)}</div>
    <p>${esc(p.idea)}</p>
    <p class="cap">${esc(p.distribution)}</p>
    ${withExtras ? `<div class="mk-extra">
      <span class="mk-chip">🪝 ${esc(p.hook)}</span>
      <span class="mk-chip">⏰ ${esc(p.bestTime)}</span>
      <span class="mk-chip">👉 ${esc(p.cta)}</span>
      <span class="mk-chip">${esc(p.hashtags)}</span>
    </div>` : ''}
    <div style="margin-top:10px"><label style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;cursor:pointer"><input type="checkbox" data-ch="posted" data-biz="${p.business}" ${done?'checked':''} style="accent-color:var(--${b.cvar})"> Mark as posted</label></div>
  </div>`;
}

function taskRow(t){
  const b = BIZ[t.business];
  return `<div class="task-row ${t.status === 'done' ? 'done' : ''}" draggable="true" data-task="${t.id}">
    <input type="checkbox" class="t-check" data-ch="toggle" data-id="${t.id}" ${t.status === 'done' ? 'checked' : ''} aria-label="Complete">
    <div class="t-body" data-act="taskModal" data-id="${t.id}">
      <div class="t-title">${esc(t.title)}</div>
      <div class="t-meta">${prioPill(t.priority)}${b ? bizChip(t.business) : ''}${t.category ? `<span class="pill neutral">${esc(t.category)}</span>` : ''}${duePill(t.due)}${t.repeat && t.repeat !== 'none' ? '<span class="pill neutral">🔁 ' + esc(t.repeat) + '</span>' : ''}${t.notes ? '📝' : ''}</div>
    </div>
  </div>`;
}

VIEWS.tasks = (r) => {
  return `
  <div class="page-head"><div><h1 class="pt">Tasks</h1><div class="pt-sub">${plural(openTasks().length, 'open task')} · ${overdue().length} overdue · everything saves instantly on this device</div></div>
  <button class="btn primary" data-act="newTask">＋ New task</button></div>
  <div class="toolbar card flat" style="padding:10px">
    <select data-ch="tf" data-k="biz"><option value="all">All businesses</option><option value="" ${TF.biz===''?'selected':''}>General</option>${AI.businesses.map(b => `<option value="${b.id}" ${TF.biz===b.id?'selected':''}>${esc(b.short)}</option>`).join('')}</select>
    <select data-ch="tf" data-k="status">${[['open','Open'],['all','All'],['done','Completed'],['archived','Archived']].map(([v,l])=>`<option value="${v}" ${TF.status===v?'selected':''}>${l}</option>`).join('')}</select>
    <select data-ch="tf" data-k="group">${[['status','Group: status'],['business','Group: business'],['priority','Group: priority'],['none','No grouping']].map(([v,l])=>`<option value="${v}" ${TF.group===v?'selected':''}>${l}</option>`).join('')}</select>
    <select data-ch="tf" data-k="sort">${[['order','Sort: manual (drag)'],['due','Sort: due date'],['priority','Sort: priority'],['created','Sort: newest']].map(([v,l])=>`<option value="${v}" ${TF.sort===v?'selected':''}>${l}</option>`).join('')}</select>
    <input type="search" placeholder="Filter tasks…" data-ch="tf" data-k="q" value="${esc(TF.q)}">
  </div>
  <div id="task-list">${taskListHTML()}</div>`;
};
const TF = { biz:'all', status:'open', group:'status', sort:'order', q:'' };
function filteredTasks(){
  let ts = st.tasks.slice();
  if (TF.status === 'open') ts = ts.filter(t => t.status === 'todo' || t.status === 'doing');
  else if (TF.status === 'done') ts = ts.filter(t => t.status === 'done');
  else if (TF.status === 'archived') ts = ts.filter(t => t.status === 'archived');
  else ts = ts.filter(t => t.status !== 'archived');
  if (TF.biz !== 'all') ts = ts.filter(t => (t.business || '') === TF.biz);
  if (TF.q) { const q = TF.q.toLowerCase(); ts = ts.filter(t => (t.title + ' ' + t.notes + ' ' + t.category).toLowerCase().includes(q)); }
  const pv = {P1:0, P2:1, P3:2};
  if (TF.sort === 'due') ts.sort((a,b) => (a.due || '9999') < (b.due || '9999') ? -1 : 1);
  else if (TF.sort === 'priority') ts.sort((a,b) => (pv[a.priority] ?? 1) - (pv[b.priority] ?? 1));
  else if (TF.sort === 'created') ts.sort((a,b) => b.created - a.created);
  else ts.sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
  return ts;
}
function taskListHTML(){
  const ts = filteredTasks();
  if (!ts.length) return '<div class="empty">No tasks match. Create one with <span class="kbd">＋ New task</span>.</div>';
  if (TF.group === 'none') return ts.map(taskRow).join('');
  const groups = {};
  const keyFn = TF.group === 'business' ? (t => t.business ? (BIZ[t.business] ? BIZ[t.business].short : t.business) : 'General')
    : TF.group === 'priority' ? (t => t.priority)
    : (t => ({todo:'To do', doing:'In progress', done:'Completed', archived:'Archived'}[t.status] || t.status));
  ts.forEach(t => { const k = keyFn(t); (groups[k] = groups[k] || []).push(t); });
  return Object.entries(groups).map(([k, arr]) => `<div class="task-group"><div class="task-group-h">${esc(k)} · ${arr.length}</div>${arr.map(taskRow).join('')}</div>`).join('');
}

VIEWS.calendar = () => {
  const items = [];
  activeTasks().filter(t => t.due && t.status !== 'done').forEach(t => items.push({ date: t.due, icon:'✅', label: t.title, sub: t.business ? (BIZ[t.business]||{}).short : '', act:'taskModal', id: t.id }));
  leads().forEach(l => { if (l.next && !/won|lost/i.test(l.status||'')) items.push({ date: l.next, icon:'📞', label: 'Follow up: ' + l.name, sub: (BIZ[l.business]||{}).short, act:'leadModal', id: l.id }); });
  items.sort((a,b) => a.date < b.date ? -1 : 1);
  const t = todayISO();
  const past = items.filter(i => i.date < t);
  const days = {};
  items.filter(i => i.date >= t).forEach(i => (days[i.date] = days[i.date] || []).push(i));
  return `
  <div class="page-head"><div><h1 class="pt">Calendar</h1><div class="pt-sub">Agenda of task deadlines and lead follow-ups</div></div></div>
  ${past.length ? `<div class="card" style="border-color:var(--urgent)"><div class="eyebrow" style="color:var(--urgent)">Slipped</div>${past.map(i => `<div class="agenda-item">${i.icon}<div style="flex:1"><span class="lead-name" data-act="${i.act}" data-id="${esc(i.id)}">${esc(i.label)}</span> <span style="color:var(--ink-dim);font-size:12px">${esc(i.sub || '')} · was ${fmtDate(i.date)}</span></div></div>`).join('')}</div>` : ''}
  ${Object.keys(days).length ? Object.entries(days).map(([d, arr]) => `<div class="agenda-day"><div class="agenda-date">${new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long', day:'numeric', month:'long'})}${d === t ? ' · today' : ''}</div>${arr.map(i => `<div class="agenda-item">${i.icon}<div style="flex:1"><span class="lead-name" data-act="${i.act}" data-id="${esc(i.id)}">${esc(i.label)}</span> <span style="color:var(--ink-dim);font-size:12px">${esc(i.sub || '')}</span></div></div>`).join('')}</div>`).join('') : '<div class="empty">Nothing scheduled ahead.</div>'}`;
};

  <button class="btn primary" data-act="newLead">＋ New lead</button></div>

VIEWS.finance = () => {
  const ex = expenses().slice().sort((a,b) => a.date < b.date ? 1 : -1);
  const month = todayISO().slice(0,7);
  const mtd = ex.filter(e => e.date && e.date.startsWith(month) && !e.flag).reduce((s,e) => s + Number(e.amount||0), 0);
  const owed = ex.filter(e => e.flag === 'urgent').reduce((s,e) => s + Number(e.amount||0), 0);
  const check = ex.filter(e => e.flag === 'warn').reduce((s,e) => s + Number(e.amount||0), 0);
  const cats = {};
  ex.filter(e => !e.flag).forEach(e => cats[e.category || 'Other'] = (cats[e.category || 'Other'] || 0) + Number(e.amount||0));
  const maxCat = Math.max(1, ...Object.values(cats));
  return `
  <div class="page-head"><div><h1 class="pt">Finance</h1><div class="pt-sub">Auto-tracked from Gmail alerts + your manual entries. Not a bank feed.</div></div>
  <button class="btn primary" data-act="newExpense">＋ Add entry</button></div>
  <div class="grid3">
    ${statTile(fmtMoney(owed), 'Overdue / needs payment', owed ? 'urgent' : '')}
    ${statTile(fmtMoney(check), 'To verify')}
    ${statTile(fmtMoney(mtd), 'Tracked spend this month')}
  </div>
  <div class="card"><div class="eyebrow">By category</div>
    ${Object.entries(cats).sort((a,b) => b[1] - a[1]).map(([c, v]) => `<div class="bar-row"><div class="bar-label">${esc(c)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v / maxCat * 100)}%"></div></div><div class="bar-val">${fmtMoney(v)}</div></div>`).join('') || '<div class="empty">No categorised spends yet.</div>'}
  </div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Vendor</th><th>Category</th><th>Status</th><th style="text-align:right">Amount</th><th></th></tr></thead><tbody>
    ${ex.map(e => `<tr><td>${fmtDate(e.date)}</td><td><strong>${esc(e.vendor)}</strong>${e.note ? `<div style="font-size:11.5px;color:var(--ink-dim)">${esc(e.note)}</div>` : ''}</td><td>${esc(e.category || '')}</td>
      <td>${e.flag === 'urgent' ? '<span class="pill urgent">overdue</span>' : e.flag === 'warn' ? '<span class="pill warn">verify</span>' : e.flag === 'paid' ? '<span class="pill ok">paid</span>' : '<span class="pill ok">logged</span>'}</td>
      <td style="text-align:right"><span class="amt">${fmtMoney(e.amount)}</span></td>
      <td>${e.flag === 'urgent' || e.flag === 'warn' ? `<button class="btn sm" data-act="expPaid" data-id="${esc(e.id)}">Mark paid</button>` : ''}</td></tr>`).join('')}
  </tbody></table></div>
  <div class="note-box">The 6 AM routine appends new Gmail-detected transactions daily. Marking something paid here is permanent — the routine never un-marks it.</div>`;
};

VIEWS.analytics = () => {
  const week = [...Array(7)].map((_, i) => { const d = new Date(Date.now() - (6 - i) * 864e5); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); });
  const doneBy = {};
  st.tasks.filter(t => t.status === 'done' && t.completedAt).forEach(t => { const d = new Date(t.completedAt).toISOString().slice(0,10); doneBy[d] = (doneBy[d] || 0) + 1; });
  const maxDone = Math.max(1, ...week.map(d => doneBy[d] || 0));
  return `
  <div class="page-head"><div><h1 class="pt">Executive Dashboard</h1><div class="pt-sub">Cross-business health at a glance</div></div></div>
  <div class="grid4">
    ${statTile(openTasks().length, 'Open tasks')}
    ${statTile(leads().filter(l => l.kind !== 'research').length, 'Leads in CRM')}
    ${statTile(leads().filter(l => /conversation|meeting|proposal/i.test(l.status)).length, 'Active conversations')}
    ${statTile(st.tasks.filter(t => t.status === 'done').length, 'Tasks completed (all time)')}
  </div>
  <div class="grid2">
    <div class="card"><div class="eyebrow">Momentum</div><h2 class="st" style="margin:4px 0 10px">Tasks completed, last 7 days</h2>

    </div>
    <div class="card"><div class="eyebrow">Pipeline</div><h2 class="st" style="margin:4px 0 10px">Uncontacted leads per business</h2>

/* ============ palette ============ */
let palSel = 0;
function paletteItems(q){
  const items = [];
  NAV.forEach(n => items.push({ icon:n.icon, label:n.label, sub:'Go to', run:() => { location.hash = '#/' + n.id; } }));
  AI.businesses.forEach(b => items.push({ icon:'🏢', label:b.name, sub:'Workspace', run:() => { location.hash = '#/biz/' + b.id; } }));
  items.push({ icon:'＋', label:'New task', sub:'Create', run:() => taskModal(null) });
  items.push({ icon:'＋', label:'New lead', sub:'Create', run:() => leadModal(null) });
  items.push({ icon:'🌓', label:'Toggle dark / light theme', sub:'Command', run:toggleTheme });
  items.push({ icon:'⬇', label:'Export data backup', sub:'Command', run:exportBackup });
  if (q) {
    const s = q.toLowerCase();
    st.tasks.filter(t => t.status !== 'archived' && t.title.toLowerCase().includes(s)).slice(0,5).forEach(t => items.push({ icon:'✅', label:t.title, sub:'Task', run:() => taskModal(t) }));
    leads().filter(l => (l.name + ' ' + (l.cat||'') + ' ' + (l.area||'')).toLowerCase().includes(s)).slice(0,6).forEach(l => items.push({ icon:'👤', label:l.name, sub:(BIZ[l.business]||{}).short || 'Lead', run:() => leadModal(l) }));
    expenses().filter(e => (e.vendor + ' ' + (e.category||'')).toLowerCase().includes(s)).slice(0,4).forEach(e => items.push({ icon:'💰', label:e.vendor + ' · ' + fmtMoney(e.amount), sub:'Finance', run:() => { location.hash = '#/finance'; } }));
    AI.docs.filter(d => d.title.toLowerCase().includes(s)).slice(0,4).forEach(d => items.push({ icon:'📄', label:d.title, sub:'Open in Drive', run:() => window.open(d.url, '_blank', 'noopener') }));
    return items.filter(i => i.label.toLowerCase().includes(s) || ['Task','Lead','Finance'].includes(i.sub));
  }
  return items;
}
function openPalette(){
  palSel = 0;
  openOverlay(`<div class="palette"><input id="pal-q" placeholder="Type a command or search everything…" autocomplete="off"><div class="pal-list" id="pal-list"></div></div>`);
  const inp = document.getElementById('pal-q');
  const paint = () => {
    const items = paletteItems(inp.value);
    palSel = Math.min(palSel, Math.max(0, items.length - 1));
    document.getElementById('pal-list').innerHTML = items.length
      ? items.map((it, i) => `<div class="pal-item ${i === palSel ? 'sel' : ''}" data-pal="${i}"><span class="ico">${it.icon}</span>${esc(it.label)}<span class="sub">${esc(it.sub)}</span></div>`).join('')
      : '<div class="pal-empty">No matches.</div>';
  };
  paint();
  inp.addEventListener('input', () => { palSel = 0; paint(); });
  inp.addEventListener('keydown', e => {
    const items = paletteItems(inp.value);
    if (e.key === 'ArrowDown') { e.preventDefault(); palSel = Math.min(palSel + 1, items.length - 1); paint(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); palSel = Math.max(palSel - 1, 0); paint(); }
    else if (e.key === 'Enter') { e.preventDefault(); const it = items[palSel]; if (it) { closeOverlay(); it.run(); } }
    else if (e.key === 'Escape') closeOverlay();
  });
  document.getElementById('pal-list').addEventListener('click', e => {
    const el = e.target.closest('[data-pal]'); if (!el) return;
    const it = paletteItems(inp.value)[+el.dataset.pal];
    if (it) { closeOverlay(); it.run(); }
  });
}

/* ============ notifications panel ============ */
function openNotifs(){
  const ns = computeNotifs();
  layer.innerHTML = `<div class="overlay" data-overlay style="background:transparent;place-items:start end"><div class="notif-panel">
    ${ns.map(n => `<div class="notif ${st.notifRead[n.id] ? '' : 'unread'}" data-nroute="${esc(n.route)}"><span>${n.icon}</span><div><div class="nt">${esc(n.title)}</div><div class="nb">${esc(n.body)}</div></div></div>`).join('') || '<div class="pal-empty">All clear.</div>'}
  </div></div>`;
  ns.forEach(n => st.notifRead[n.id] = 1); save();
  layer.querySelectorAll('[data-nroute]').forEach(el => el.addEventListener('click', () => { const r = el.dataset.nroute; closeOverlay(); location.hash = r; render(); }));
}

/* ============ copilot brain ============ */
function copilotAnswer(q){
  const s = q.toLowerCase();
  const fu = followupsDue(); const od = overdue(); const dt = dueToday(); const ue = urgentExpenses();
  if (/post|content|reel|caption|story/.test(s)) {
    return 'Today (' + AI.posting.day + '):\n' + (AI.posting.plans||[]).map(p => '• ' + (BIZ[p.business]||{}).short + ' — ' + p.pillar + ' (best time ' + p.bestTime + ')').join('\n') + '\n\nFull hooks, captions and hashtags are in the Marketing Planner.';
  }
  if (/call|client|contact|phone|reach/.test(s) && !/not been|recently/.test(s)) {
    const top = fu.length ? fu : leads().filter(l => l.status === 'Not contacted' && l.priority === 'HIGH').slice(0,5);
    return (fu.length ? 'Follow-ups due now:\n' : 'Nothing due — highest-priority uncontacted leads:\n') + top.slice(0,6).map(l => '• ' + l.name + ' (' + ((BIZ[l.business]||{}).short) + ') ' + (l.phone || l.link || '')).join('\n');
  }
  if (/invoice|overdue|bill|pay|due/.test(s)) {
    const lines = [];
    ue.forEach(e => lines.push('• ' + e.vendor + ' — ' + fmtMoney(e.amount) + ' (URGENT)'));
    expenses().filter(e => e.flag === 'warn').forEach(e => lines.push('• ' + e.vendor + ' — ' + fmtMoney(e.amount) + ' (verify)'));
    od.forEach(t => lines.push('• Task overdue: ' + t.title + ' (was due ' + fmtDate(t.due) + ')'));
    return lines.length ? lines.join('\n') : 'Nothing overdue right now. 👌';
  }
  if (/not been|recently|stale|neglect/.test(s)) {
    const stale = leads().filter(l => l.status === 'Not contacted' && l.kind !== 'research');
    return plural(stale.length, 'lead') + ' never contacted. Oldest follow-up dates:\n' + stale.sort((a,b) => (a.next||'9999') < (b.next||'9999') ? -1 : 1).slice(0,7).map(l => '• ' + l.name + ' (' + ((BIZ[l.business]||{}).short) + ') — planned ' + fmtDate(l.next)).join('\n');
  }
  if (/revenue|forecast|earn|income/.test(s)) {
    const withVal = leads().filter(l => l.value && !/won|lost/i.test(l.status));
    if (!withVal.length) return 'No revenue data is connected yet, so I won\'t invent a forecast. Add "Est. value" and "Conversion %" on leads (open any lead → edit) and I\'ll compute a weighted pipeline. You can also log won deals as leads with status Won.';
    const sum = withVal.reduce((s2, l) => s2 + Number(l.value) * (Number(l.prob||50) / 100), 0);
    return 'Weighted pipeline across ' + plural(withVal.length, 'valued lead') + ': ~' + fmtMoney(Math.round(sum)) + '. (Est. value × conversion %, open deals only.)';
  }
  if (/today|do|start|priorit/.test(s)) {
    return ['Your day:',
      ue.length ? '1. Pay: ' + ue.map(e => e.vendor + ' (' + fmtMoney(e.amount) + ')').join(', ') : null,
      od.length ? '• Clear ' + plural(od.length, 'overdue task') + ': ' + od.slice(0,3).map(t => t.title).join('; ') : null,
      dt.length ? '• Due today: ' + dt.slice(0,4).map(t => t.title).join('; ') : null,
      fu.length ? '• Call: ' + fu.slice(0,3).map(l => l.name).join(', ') : null,
      '• Post: ' + (AI.posting.plans||[]).map(p => (BIZ[p.business]||{}).short).join(', ') + ' (see Marketing Planner)'
    ].filter(Boolean).join('\n');
  }
  return 'I can answer from your live data: try "What should I do today?", "Which clients should I call?", "Which bills are overdue?", "What content should I post?", "What is my revenue forecast?" — for anything deeper, ask me in the Claude session that maintains this dashboard.';
}

/* ============ actions ============ */
function toggleTheme(){
  const dark = st.theme === 'dark' || (!st.theme && matchMedia('(prefers-color-scheme: dark)').matches);
  st.theme = dark ? 'light' : 'dark'; save(); render();
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(st, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bizos-backup-' + todayISO() + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup downloaded');
}
function toast(msg){
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2400);
}
function findLead(id){ return leads().find(l => l.id === id); }
function setLead(id, patch){
  const isUser = st.userLeads.some(l => l.id === id);
  if (isUser) { const l = st.userLeads.find(x => x.id === id); Object.assign(l, patch); }
  else st.leadOverrides[id] = Object.assign(st.leadOverrides[id] || {}, patch);
  save();
}

const ACTIONS = {
  close: closeOverlay,
  menu: () => document.getElementById('sidebar').classList.toggle('open'),
  palette: openPalette,
  bell: openNotifs,
  theme: toggleTheme,
  setTheme: el => { st.theme = el.dataset.v || null; save(); render(); },
  export: exportBackup,
  reset: () => {
    openOverlay(`<div class="modal"><h3>Reset local data?</h3><p style="font-size:13px;color:var(--ink-dim)">This wipes every task, note, status and edit stored on this device. AI-suggested data will re-seed fresh. This cannot be undone — export a backup first.</p><div class="modal-foot"><button class="btn danger" data-act="reallyReset">Yes, wipe it</button><span class="spacer"></span><button class="btn ghost" data-act="close">Cancel</button></div></div>`);
  },
  reallyReset: () => { localStorage.removeItem(KEY); st = load(); closeOverlay(); render(); toast('Local data reset'); },
  newTask: el => taskModal(null),
  taskModal: el => { const t = st.tasks.find(x => x.id === el.dataset.id); if (t) taskModal(t); },
  dupTask: el => {
    const t = st.tasks.find(x => x.id === el.dataset.id); if (!t) return;
    const c = Object.assign({}, t, { id: uid(), title: t.title + ' (copy)', status:'todo', created: Date.now(), order: st.tasks.length, seed:'' });
    st.tasks.push(c); save(); closeOverlay(); render(); toast('Task duplicated');
  },
  archTask: el => { const t = st.tasks.find(x => x.id === el.dataset.id); if (t) { t.status = 'archived'; save(); closeOverlay(); render(); toast('Archived'); } },
  delTask: el => { st.tasks = st.tasks.filter(x => x.id !== el.dataset.id); save(); closeOverlay(); render(); toast('Task deleted'); },
  newLead: el => leadModal(null, el.dataset.biz),
  leadModal: el => { const l = findLead(el.dataset.id); if (l) leadModal(l); },
  archLead: el => { setLead(el.dataset.id, { archived: true }); closeOverlay(); render(); toast('Lead archived'); },
  logContact: el => {
    setLead(el.dataset.id, { last: todayISO(), status:'Contacted' });
    closeOverlay(); render(); toast('Contact logged — set the next follow-up from the lead card');
  },
  newExpense: expenseModal,
  expPaid: el => {
    const id = el.dataset.id;
    if (st.userExpenses.some(e => e.id === id)) { const e = st.userExpenses.find(x => x.id === id); e.flag = 'paid'; }
    else st.expenseOverrides[id] = Object.assign(st.expenseOverrides[id] || {}, { flag:'paid' });
    save(); render(); toast('Marked paid ✅');
  },
  ask: el => runCopilot(el.dataset.q)
};

function runCopilot(q){
  st.copilot.push({ role:'user', text:q });
  st.copilot.push({ role:'ai', text: copilotAnswer(q) });
  if (st.copilot.length > 40) st.copilot = st.copilot.slice(-40);
  save(); render();
  const c = document.getElementById('chat'); if (c) c.scrollTop = c.scrollHeight;
}

/* ============ event wiring ============ */
document.addEventListener('click', e => {
  const ov = e.target.closest('[data-overlay]');
  if (ov && e.target === ov) { closeOverlay(); return; }
  const el = e.target.closest('[data-act]');
  if (el) { const fn = ACTIONS[el.dataset.act]; if (fn) { fn(el, e); return; } }
  const sb = document.getElementById('sidebar');
  if (sb && sb.classList.contains('open') && e.target.closest('a.nav-item')) sb.classList.remove('open');
});
window.addEventListener('hashchange', render);
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); }
  if (e.key === 'Escape') closeOverlay();
});

const CHANGES = {
  toggle: el => {
    const t = st.tasks.find(x => x.id === el.dataset.id); if (!t) return;
    if (el.checked) {
      t.status = 'done'; t.completedAt = Date.now();
      if (t.repeat && t.repeat !== 'none' && t.due) {
        const d = new Date(t.due + 'T00:00:00');
        if (t.repeat === 'daily') d.setDate(d.getDate() + 1);
        if (t.repeat === 'weekly') d.setDate(d.getDate() + 7);
        if (t.repeat === 'monthly') d.setMonth(d.getMonth() + 1);
        st.tasks.push(Object.assign({}, t, { id: uid(), status:'todo', completedAt: null, due: d.toISOString().slice(0,10), created: Date.now(), order: st.tasks.length }));
        toast('Done — next occurrence scheduled');
      } else toast('Done ✅');
    } else { t.status = 'todo'; t.completedAt = null; }
    save(); render();
  },
  tf: el => { TF[el.dataset.k] = el.value; const list = document.getElementById('task-list'); if (list) list.innerHTML = taskListHTML(); },
  cf: el => { CF[el.dataset.k] = el.value; render(); },
  leadStatus: el => { setLead(el.dataset.id, { status: el.value, last: /contacted|conversation|meeting|proposal/i.test(el.value) ? todayISO() : (findLead(el.dataset.id)||{}).last }); render(); },
  leadNext: el => { setLead(el.dataset.id, { next: el.value }); render(); },
  posted: el => { st.posted[AI.posting.date + '-' + el.dataset.biz] = el.checked ? 1 : 0; save(); render(); },
  import: el => {
    const f = el.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => { try { const data = JSON.parse(rd.result); st = Object.assign(defaults(), data); save(); render(); toast('Backup restored'); } catch(err){ toast('Invalid backup file'); } };
    rd.readAsText(f);
  }
};
document.addEventListener('change', e => {
  const el = e.target.closest('[data-ch]'); if (!el) return;
  const fn = CHANGES[el.dataset.ch]; if (fn) fn(el);
});
document.addEventListener('input', e => {
  const el = e.target.closest('[data-ch="tf"],[data-ch="cf"]');
  if (!el || el.type !== 'search') return;
  if (el.dataset.ch === 'tf') { TF[el.dataset.k] = el.value; const list = document.getElementById('task-list'); if (list) list.innerHTML = taskListHTML(); }
});

document.addEventListener('submit', e => {
  const f = e.target.closest('[data-form]'); if (!f) return;
  e.preventDefault();
  const kind = f.dataset.form;
  const fd = new FormData(f);
  const g = k => (fd.get(k) || '').toString().trim();
  if (kind === 'task') {
    const id = f.dataset.id;
    const patch = { title: g('title'), business: g('business'), category: g('category'), priority: g('priority'),
      status: g('status'), due: g('due'), est: g('est'), repeat: g('repeat'), notes: g('notes'),
      links: g('links') ? g('links').split(',').map(x => x.trim()).filter(Boolean) : [] };
    if (id) { const t = st.tasks.find(x => x.id === id); if (t) { Object.assign(t, patch); if (patch.status === 'done' && !t.completedAt) t.completedAt = Date.now(); } }
    else st.tasks.push(Object.assign({ id: uid(), created: Date.now(), order: st.tasks.length, completedAt: null }, patch));
    save(); closeOverlay(); render(); toast(id ? 'Saved' : 'Task created');
  } else if (kind === 'lead') {
    const id = f.dataset.id;
    const patch = { name: g('name'), business: g('business'), cat: g('cat'), area: g('area'), phone: g('phone'),
      link: g('link'), priority: g('priority'), status: g('status'), last: g('last'), next: g('next'),
      value: g('value'), prob: g('prob'), pitch: g('pitch'), notes: g('notes') };
    if (id) setLead(id, patch);
    else st.userLeads.push(Object.assign({ id: uid(), source:'Added manually' }, patch));
    save(); closeOverlay(); render(); toast(id ? 'Lead saved' : 'Lead added');
  } else if (kind === 'expense') {
    st.userExpenses.push({ id: uid(), date: g('date'), vendor: g('vendor'), amount: parseFloat(g('amount')) || 0,
      category: g('category'), flag: g('flag'), note: g('note') });
    save(); closeOverlay(); render(); toast('Entry added');
  } else if (kind === 'copilot') {
    const q = g('q'); if (q) runCopilot(q);
  }
});

/* drag & drop reorder */
let dragId = null;
document.addEventListener('dragstart', e => {
  const row = e.target.closest('.task-row'); if (!row) return;
  dragId = row.dataset.task; row.classList.add('dragging');
});
document.addEventListener('dragend', e => {
  const row = e.target.closest('.task-row'); if (row) row.classList.remove('dragging'); dragId = null;
});
document.addEventListener('dragover', e => { if (e.target.closest('.task-row')) e.preventDefault(); });
document.addEventListener('drop', e => {
  const over = e.target.closest('.task-row'); if (!over || !dragId || over.dataset.task === dragId) return;
  e.preventDefault();
  const a = st.tasks.find(t => t.id === dragId); const b = st.tasks.find(t => t.id === over.dataset.task);
  if (!a || !b) return;
  const tmp = a.order; a.order = b.order; b.order = tmp;
  save(); const list = document.getElementById('task-list'); if (list) list.innerHTML = taskListHTML(); else render();
});

render();
</script>
